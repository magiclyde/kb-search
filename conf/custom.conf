# ==============================================================
# 自定义 PostgreSQL 参数
# 此文件通过 include 方式加载，会覆盖 postgresql.conf 中同名参数
# ==============================================================

# --------------------------------------------------------------
# 内存（根据实际机器调整，以下适合 4GB 内存的开发机）
# --------------------------------------------------------------
shared_buffers            = 512MB
work_mem                  = 32MB
maintenance_work_mem      = 256MB
effective_cache_size      = 1GB

# --------------------------------------------------------------
# 向量索引构建并行度
# --------------------------------------------------------------
max_parallel_maintenance_workers = 2
max_parallel_workers_per_gather  = 2

# --------------------------------------------------------------
# 慢查询日志（开发阶段建议开启）
# --------------------------------------------------------------
log_min_duration_statement = 1000    # 超过 1000ms 的查询记录日志
log_line_prefix            = '%t [%p] %u@%d '

# --------------------------------------------------------------
# 如需新增 shared_preload_libraries（例如 timescaledb），
# 取消下方注释并追加。注意不能删除已有的几个，只能追加。
# paradedb 基础镜像已设置：
#   shared_preload_libraries = 'pg_search,pg_cron,pg_stat_statements'
# --------------------------------------------------------------
# shared_preload_libraries = 'pg_search,pg_cron,pg_stat_statements,timescaledb'